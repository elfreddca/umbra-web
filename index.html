<style>

    :root {
        --bg-dark: #050505;
        --accent: #ffffff;
        --glass: rgba(255, 255, 255, 0.03);
        --border: rgba(255, 255, 255, 0.1);
        --primary-woman: #ff8ec7;

    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        background-color: var(--bg-dark);
        color: #fff;
        font-family: 'Manrope', sans-serif;
        overflow-x: hidden;
    }

    .background-glow {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
        background: radial-gradient(circle at 50% 30%, #1a1a1a 0%, #000 70%);
    }

    h1, h2, h3 { 
        font-family: 'Teko', sans-serif; 
        text-transform: uppercase; 
        line-height: 0.9;
        margin: 0;
    }

    .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 0 20px;
    }

    /* === HERO === */
    .hero {
        min-height: 90vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 40px 20px;
        position: relative;
    }

    .brand-badge {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 8px 25px;
        border-radius: 50px;
        margin-bottom: 30px;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(10px);
    }
    .brand-logo { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }
    .brand-text-group { display: flex; align-items: baseline; gap: 8px; }
    .brand-main { font-family: 'Teko'; font-weight: 700; letter-spacing: 2px; font-size: 1.4rem; color: #fff; line-height: 1; }
    .brand-sub { font-family: 'Manrope'; font-weight: 300; font-size: 0.9rem; color: #aaa; }

    .hero h1 {
        font-size: clamp(4rem, 15vw, 9rem);
        letter-spacing: -2px;
        font-weight: 700;
        margin-bottom: 20px;
        line-height: 0.85;
        text-transform: uppercase;
    }
    
    .hero h1 .line-1 { display: block; color: #fff; }
    .hero h1 .line-2 { 
        display: block; 
        background: linear-gradient(180deg, #fff 0%, #666 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .hero p {
        font-size: 1.2rem;
        color: #aaa;
        max-width: 600px;
        line-height: 1.6;
        margin-bottom: 40px;
    }

    .cta-container {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        justify-content: center;
    }

    .btn-hero {
        padding: 15px 40px;
        font-family: 'Teko', sans-serif;
        font-size: 1.5rem;
        text-decoration: none;
        color: #000;
        background: #fff;
        font-weight: 600;
        text-transform: uppercase;
        clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        transition: 0.3s;
        border: none;
    }
    .btn-hero:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(255,255,255,0.1); }
    .btn-hero.woman { background: var(--primary-woman); box-shadow: 0 0 20px rgba(255, 142, 199, 0.2); }
    /* Gold Glow Animation */
    @keyframes goldPulse {
        0% { box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }
        50% { box-shadow: 0 0 25px rgba(212, 175, 55, 0.6); border-color: #fff; }
        100% { box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }
    }

    /* Red Glow Animation (Static Intense Glow) */
    @keyframes redGlow {
        0% { box-shadow: 0 0 20px rgba(255, 51, 51, 0.6); filter: brightness(120%); border-color: #fff; }
        50% { box-shadow: 0 0 35px rgba(255, 51, 51, 0.9); filter: brightness(140%); }
        100% { box-shadow: 0 0 20px rgba(255, 51, 51, 0.6); filter: brightness(120%); border-color: #fff; }
    }

    .btn-hero.gold { 
        background: transparent; 
        color: #D4AF37; 
        border: 1px solid #D4AF37; 
        animation: goldPulse 2s infinite ease-in-out;
    }
    .btn-hero.gold:hover { 
        background: #D4AF37; 
        color: #000; 
        box-shadow: 0 0 40px rgba(212, 175, 55, 0.8); 
        animation: none;
    }

    /* === PROBLEM SECTION === */
    .problem-section {
        padding: 80px 20px;
        text-align: center;
        background: rgba(255,255,255,0.02);
        border-top: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
    }

    .problem-section p { max-width: 700px; margin: 0 auto; color: #888; font-size: 1.1rem; }

    /* === TESTIMONIALS === */
    .testimonials-section {
        padding: 80px 20px;
        text-align: center;
        border-bottom: 1px solid var(--border);
    }
    .testimonials-section h2 { margin-bottom: 50px; font-size: 3.5rem; color: #fff; }
    
    .testi-grid {
        display: flex;
        gap: 20px;
        overflow-x: auto;
        padding-bottom: 30px;
        scroll-snap-type: x mandatory;
        justify-content: flex-start;
        padding-left: 20px;
        -webkit-overflow-scrolling: touch; /* Smooth scroll iOS */
        scrollbar-width: none; /* Firefox hide */
    }
    
    /* Animation for Auto-Scroll Hint (Optional pulse or arrow could be added here) */
    
    .testi-card {
        min-width: 85vw; /* Mobile optimization: Card takes most of screen width */
        max-width: 85vw;
        scroll-snap-align: center;
        background: #0f0f0f;
        border: 1px solid #222;
        padding: 25px;
        border-radius: 8px;
        text-align: left;
        position: relative;
        flex-shrink: 0; /* Prevent squishing */
    }

    @media (min-width: 768px) {
        .testi-card { min-width: 380px; max-width: 380px; }
        .testi-grid { justify-content: center; flex-wrap: wrap; overflow: visible; padding-left: 0; }
    }
    .testi-card img {
        width: 100%;
        height: 450px;
        object-fit: contain;
        background: #000;
        border-radius: 4px;
        margin-bottom: 20px;
        filter: grayscale(0%);
        transition: 0.3s;
    }
    .testi-name { font-family: 'Teko'; font-size: 1.8rem; color: #fff; margin-bottom: 5px; }
    .testi-result { color: #D4AF37; font-weight: bold; font-size: 1rem; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
    .testi-quote { font-style: italic; color: #ccc; font-size: 1rem; line-height: 1.5; }

    @media (min-width: 1024px) {
        .testi-grid { justify-content: center; flex-wrap: wrap; overflow: visible; }
        .mobile-hint { display: none !important; }
    }
    @media (max-width: 768px) {
        .testi-card { min-width: 320px; max-width: 320px; }
        .testi-card img { height: 400px; }
    }

    /* === FREE RESOURCES === */
    .free-resources {
        background: linear-gradient(180deg, #050505 0%, #111 100%);
        padding: 100px 20px;
        text-align: center;
        border-top: 1px solid #222;
        border-bottom: 1px solid #222;

        overflow: hidden;

    /* Neon accent */

    .resource-card {

    .resource-tag {

    .resource-desc { font-size: 1.1rem; color: #aaa; margin-bottom: 30px; line-height: 1.6; }
    
    .btn-download {
        background: #fff; color: #000; font-family: 'Teko'; font-size: 1.8rem; font-weight: 700;
        padding: 15px 40px; text-decoration: none; display: inline-flex; align-items: center; gap: 10px;
        transition: 0.3s; width: 100%; justify-content: center;
    }
    .btn-download:hover { background: #ccc; transform: translateY(-2px); }

    .resource-mockup {
        width: 100%; height: 300px; background: #151515;
        display: flex; justify-content: center; align-items: center;
        border-bottom: 1px solid #222;
        position: relative;

    .pdf-cover {

        display: flex; flex-direction: column; justify-content: center; align-items: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        transform: rotate(-5deg);
    }

    @media (min-width: 768px) {
        .resource-card { flex-direction: row; }

    .card {
        background: linear-gradient(145deg, #0f0f0f, #050505);
        border: 1px solid #222;
        padding: 40px;

    .card:hover { border-color: #444; transform: translateY(-5px); }

    .card .desc { color: #aaa; margin-bottom: 30px; line-height: 1.6; font-size: 1rem; border-bottom: 1px solid #222; padding-bottom: 20px; }
    
    .features li {
        list-style: none;

    .btn-card {
        display: block;

        color: #000;
        text-decoration: none;
        font-family: 'Teko';
        font-size: 1.6rem;
        font-weight: 700;
        text-transform: uppercase;
        border: 1px solid #fff;

    .btn-card:hover { background: transparent; color: #fff; }
    
    .woman .btn-card { background: var(--primary-woman); border-color: var(--primary-woman); }
    .woman .btn-card:hover { background: transparent; color: var(--primary-woman); }

    /* === COACHING 1:1 SECTION === */
    .coaching-premium {
        background: linear-gradient(145deg, #0a0a0a 0%, #111 100%);

    .coaching-premium::before {

    .coaching-premium h3 {
        font-size: 3.5rem;
        margin-bottom: 10px;
        color: #fff;
        position: relative;
        z-index: 1;
    }

    .coaching-premium .sub-headline {
        color: #D4AF37; /* Gold */
        font-family: 'Teko', sans-serif;
        font-size: 1.8rem;
        text-transform: uppercase;
        margin-bottom: 30px;
        position: relative;
        z-index: 1;
        letter-spacing: 1px;
    }

    .coaching-premium .desc {
        max-width: 700px;
        margin: 0 auto 40px auto;
        color: #ccc;
        font-size: 1.1rem;
        position: relative;
        z-index: 1;
    }

    .coaching-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
        position: relative;
        z-index: 1;
        text-align: left;
    }

    .coaching-item {
        background: rgba(255,255,255,0.03);

    }

    .coaching-item strong { color: #fff; display: block; margin-bottom: 5px; font-size: 1.1rem; }

    .btn-gold {
        display: inline-block;
        padding: 18px 50px;
        background: #D4AF37;
        color: #000;
        font-family: 'Teko';
        font-size: 1.6rem;
        font-weight: 700;
        text-decoration: none;
        text-transform: uppercase;
        clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);

        position: relative;
        z-index: 1;
        box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
    }
    .btn-gold:hover {
        background: #fff;
        box-shadow: 0 0 40px rgba(255, 255, 255, 0.4);
        transform: scale(1.02);
    }
    
    .price-tag {
        font-size: 3rem;
        font-family: 'Teko';
        color: #fff;
        margin-bottom: 20px;
        position: relative;
        z-index: 1;
    }

    @media (max-width: 768px) {
        .coaching-premium { padding: 40px 20px; }
        .coaching-premium h3 { font-size: 2.8rem; }
        .btn-gold { width: 100%; padding: 15px 20px; font-size: 1.4rem; }
        .coaching-grid { grid-template-columns: 1fr; }
    }
</style>
